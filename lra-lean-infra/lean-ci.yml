name: Lean Build and Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'LRA/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
  pull_request:
    branches: [main]
    paths:
      - 'LRA/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'

jobs:
  build:
    name: Lake Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Lean toolchain version
        id: toolchain
        run: echo "version=$(cat lean-toolchain)" >> $GITHUB_OUTPUT

      - name: Cache elan and Lean toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.cache/mathlib
          key: lean-${{ steps.toolchain.outputs.version }}-${{ runner.os }}
          restore-keys: |
            lean-${{ steps.toolchain.outputs.version }}-

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | bash -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Lean toolchain
        run: |
          elan toolchain install "$(cat lean-toolchain)"
          elan default "$(cat lean-toolchain)"

      - name: Lake update
        run: lake update

      # ── VolumeII: no sorry, no Mathlib ──────────────────────

      - name: Check no sorry in VolumeII
        run: |
          if grep -rn "sorry" LRA/VolumeII/ --include="*.lean"; then
            echo "ERROR: 'sorry' found in VolumeII. Remove before merging."
            exit 1
          fi
          echo "✓ No sorry in VolumeII"

      - name: Check no Mathlib import in VolumeII
        run: |
          if grep -rn "^import Mathlib" LRA/VolumeII/ --include="*.lean"; then
            echo "ERROR: Mathlib import found in VolumeII. VolumeII must be bare Lean 4."
            exit 1
          fi
          echo "✓ No Mathlib imports in VolumeII"

      - name: Build VolumeII
        run: lake build LRAVolumeII

      # ── VolumeI (Mathlib permitted) ──────────────────────────

      - name: Build VolumeI
        run: lake build LRAVolumeI
        continue-on-error: true  # VolumeI is exploratory

      # ── Doc-comment lint ────────────────────────────────────

      - name: Lint doc-comments
        run: |
          if [[ -f scripts/lint_doccomments.sh ]]; then
            bash scripts/lint_doccomments.sh LRA/VolumeII || true
          fi
        # Warning only — not blocking CI until all files are annotated

      # ── Stats ────────────────────────────────────────────────

      - name: Print proof statistics
        run: |
          echo "── Proof statistics ─────────────────────────────"
          find LRA/VolumeII -name "*.lean" | sort | while read f; do
            thms=$(grep -c "^theorem\|^lemma\|^corollary" "$f" 2>/dev/null || echo 0)
            defs=$(grep -c "^def\|^noncomputable def" "$f" 2>/dev/null || echo 0)
            echo "  $f : $thms theorems, $defs defs"
          done
