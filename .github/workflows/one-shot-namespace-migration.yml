name: One-shot Peano namespace migration

on:
  push:
    branches:
      - agent/number-system-models-blueprint
    paths:
      - scripts/migrate_peano_namespaces.py
      - .github/workflows/one-shot-namespace-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, '[namespace-migration]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/number-system-models-blueprint
          fetch-depth: 0

      - name: Rewrite legacy namespaces
        run: python3 scripts/migrate_peano_namespaces.py

      - name: Verify no legacy namespace remains
        run: |
          if grep -R -n -E '^namespace Peano\b|^open Peano\b|\bPeano\.[A-Za-z_]' LRA --include='*.lean'; then
            echo 'Legacy Peano namespace content remains.'
            exit 1
          fi

      - name: Commit migration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add LRA
          if git diff --cached --quiet; then
            echo 'Namespace migration already applied.'
            exit 0
          fi
          git commit -m 'refactor: migrate Peano namespaces [namespace-migration]'
          git push origin HEAD:agent/number-system-models-blueprint
