name: Lean Docker Build and Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'LRA/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'Makefile'
      - 'build.ps1'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/lean-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'LRA/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'Makefile'
      - 'build.ps1'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/lean-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Docker Lake Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lean Docker image
        run: docker build --target lean-build -t lra-lean .

      - name: Check no Mathlib import in VolumeI / VolumeII
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            lra-lean \
            bash -lc 'if grep -rn "^import Mathlib" LRA/VolumeI/ LRA/VolumeII/ LRA/VolumeI.lean LRA/VolumeII.lean --include="*.lean"; then
              echo "ERROR: Mathlib import found in VolumeI/VolumeII (must be bare Lean 4)."
              exit 1
            fi
            echo "No Mathlib imports in VolumeI / VolumeII"'

      - name: Report proof placeholders in VolumeI / VolumeII
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            lra-lean \
            bash -lc 'if grep -rn "\bsorry\b" LRA/VolumeI/ LRA/VolumeII/ --include="*.lean"; then
              echo "::warning::sorry found in VolumeI/VolumeII — statements compile, proofs remain pending."
            else
              echo "No sorry in VolumeI / VolumeII"
            fi'

      - name: Build active Lean libraries
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            lra-lean \
            lake build LRAVolumeI LRAVolumeII

      - name: Lint doc-comments
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            lra-lean \
            bash -lc 'if [ -f scripts/lint_doccomments.sh ]; then
              bash scripts/lint_doccomments.sh LRA/VolumeII
            fi'

      - name: Print proof statistics
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            lra-lean \
            bash -lc 'find LRA -name "*.lean" | sort | while read f; do
              thms=$(grep -c "^theorem\|^lemma\|^corollary" "$f" 2>/dev/null || echo 0)
              defs=$(grep -c "^def\|^noncomputable def" "$f" 2>/dev/null || echo 0)
              echo "  $f : $thms theorems, $defs defs"
            done'
