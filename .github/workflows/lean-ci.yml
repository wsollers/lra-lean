name: Lean Build and Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'LRA/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
  pull_request:
    branches: [main]
    paths:
      - 'LRA/**'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
  workflow_dispatch:

jobs:
  build:
    name: Lake Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Lean toolchain version
        id: toolchain
        run: echo "version=$(cat lean-toolchain)" >> $GITHUB_OUTPUT

      - name: Cache elan and Lean toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.cache/mathlib
          key: lean-${{ steps.toolchain.outputs.version }}-${{ runner.os }}
          restore-keys: |
            lean-${{ steps.toolchain.outputs.version }}-

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | bash -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Lean toolchain
        run: |
          elan toolchain install "$(cat lean-toolchain)" || true
          elan default "$(cat lean-toolchain)"

      - name: Lake update
        run: lake update

      # ── No-Mathlib gate (hard fail) ──────────────────────────────────
      # VolumeI and VolumeII are bare Lean 4 — proved from first principles.
      # Volume III onward MAY use Mathlib, so they are exempt from this check.
      - name: Check no Mathlib import in VolumeI / VolumeII
        run: |
          if grep -rn "^import Mathlib" \
               LRA/VolumeI/ LRA/VolumeII/ LRA/VolumeI.lean LRA/VolumeII.lean \
               --include="*.lean"; then
            echo "ERROR: Mathlib import found in VolumeI/VolumeII (must be bare Lean 4)."
            exit 1
          fi
          echo "✓ No Mathlib imports in VolumeI / VolumeII"

      # ── Sorry check (warning only — does not block) ──────────────────
      - name: Check no sorry in VolumeI / VolumeII
        continue-on-error: true
        run: |
          if grep -rn "\bsorry\b" LRA/VolumeI/ LRA/VolumeII/ --include="*.lean"; then
            echo "::warning::sorry found in VolumeI/VolumeII — proofs are incomplete."
          else
            echo "✓ No sorry in VolumeI / VolumeII"
          fi

      # ── The real gate: every volume must compile (hard fail) ─────────
      # When adding a volume, add its lean_lib here AND in lakefile.lean.
      - name: Build all volumes (I–VIII)
        run: |
          lake build \
            LRAVolumeI LRAVolumeII LRAVolumeIII LRAVolumeIV \
            LRAVolumeV LRAVolumeVI LRAVolumeVII LRAVolumeVIII

      - name: Print proof statistics
        run: |
          find LRA -name "*.lean" | sort | while read f; do
            thms=$(grep -c "^theorem\|^lemma\|^corollary" "$f" 2>/dev/null || echo 0)
            defs=$(grep -c "^def\|^noncomputable def" "$f" 2>/dev/null || echo 0)
            echo "  $f : $thms theorems, $defs defs"
          done
