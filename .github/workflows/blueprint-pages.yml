name: Lean, Blueprint, and GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lra-lean-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build documentation image
        run: docker build --target documentation-build -t lra-lean-docs .

      - name: Build Lean libraries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            lake build LRAVolumeI LRAVolumeII
        # Lean accepts declarations containing `sorry`; they remain visible as
        # warnings and in the axiom footprint but do not fail this build.

      - name: Check Blueprint declaration names
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            python3 scripts/check-blueprint-declarations.py

      - name: Build Blueprint PDF
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            bash -lc 'leanblueprint pdf > blueprint-pdf.log 2>&1 || {
              status=$?
              echo "Blueprint PDF build failed. Final diagnostics:"
              tail -n 200 blueprint-pdf.log
              exit $status
            }
            tail -n 40 blueprint-pdf.log'

      - name: Upload Blueprint PDF diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-pdf-diagnostics
          path: blueprint-pdf.log
          if-no-files-found: ignore

      - name: Build Blueprint HTML
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            leanblueprint web

      - name: Assemble GitHub Pages site
        run: bash scripts/assemble-pages.sh

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
