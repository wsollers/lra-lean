name: Lean Repository Documentation and GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lra-lean-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Lean image
        run: docker build --quiet --target lean-build -t lra-lean .

      - name: Build active Lean libraries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean \
            lake build LRAVolumeI LRAVolumeII
        # Lean accepts declarations containing `sorry`; placeholders are shown
        # by the generated site and do not fail the ordinary project build.

      - name: Generate repository documentation site
        run: python3 scripts/build-repository-site.py

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
