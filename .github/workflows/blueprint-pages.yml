name: Lean Repository Documentation and GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lra-lean-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build documentation image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: documentation-build
          tags: lra-lean-docs:latest
          load: true
          cache-from: type=gha,scope=lra-lean-documentation-build
          cache-to: type=gha,scope=lra-lean-documentation-build,mode=max

      - name: Build active Lean libraries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            lake build LRAVolumeI LRAVolumeII
        # Lean accepts declarations containing `sorry`; placeholders are shown
        # by the generated site and do not fail the ordinary project build.

      - name: Generate number-system Blueprint sources
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            python3 scripts/build-number-systems-declaration-manifest.py
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            python3 scripts/build-number-systems-blueprint.py
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            python3 scripts/report-number-systems-dependency-order.py --check

      - name: Compile Blueprint
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            leanblueprint pdf
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            leanblueprint web

      - name: Check Blueprint declaration mappings
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            lra-lean-docs \
            python3 scripts/check-blueprint-declarations.py

      - name: Generate repository documentation site
        run: python3 scripts/build-repository-site.py

      - name: Attach Blueprint output to site
        run: |
          mkdir -p site/blueprint
          cp -R blueprint/web/. site/blueprint/
          cp blueprint/print/print.pdf site/number-systems-blueprint.pdf

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
